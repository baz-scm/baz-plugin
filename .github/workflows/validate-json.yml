name: validate-json

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          find . -name '*.json' -not -path './.git/*' | xargs -I{} sh -c 'python3 -m json.tool {} > /dev/null && echo "OK: {}" || exit 1'
